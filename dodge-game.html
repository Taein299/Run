<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>술래 피하기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
  :root {
    --bg:#0a0a1a; --panel:#0f0f2a;
    --accent:#ff3cac; --accent2:#00f5d4; --accent3:#ffe81a;
  }
  html,body { width:100%; height:100%; background:var(--bg); overflow:hidden; font-family:'Jua',sans-serif; }
  #wrapper {
    width:100%; height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; position:relative;
    background:radial-gradient(ellipse at 50% 30%,#1a0a3a 0%,#0a0a1a 70%);
  }

  /* Credit bar */
  #credit-bar {
    width:100%; max-width:420px; text-align:center;
    padding:5px 0 2px; flex-shrink:0; z-index:10;
    font-family:'Black Han Sans',sans-serif; font-size:11px;
    color:rgba(255,255,255,.3); letter-spacing:2px;
  }
  #credit-bar span { color:#a78bfa; text-shadow:0 0 8px rgba(167,139,250,.6); }

  /* HUD */
  #hud {
    width:100%; max-width:420px; display:flex; justify-content:space-between;
    align-items:center; padding:8px 16px 4px; z-index:10; flex-shrink:0;
  }
  .hud-box {
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
    border-radius:12px; padding:5px 12px; text-align:center;
  }
  .hud-label { font-size:9px; color:rgba(255,255,255,.4); letter-spacing:2px; text-transform:uppercase; }
  .hud-value { font-family:'Black Han Sans',sans-serif; font-size:20px; color:var(--accent3); text-shadow:0 0 12px var(--accent3); line-height:1; }
  #level-badge {
    font-family:'Black Han Sans',sans-serif; font-size:12px; color:var(--accent);
    background:rgba(255,60,172,.15); border:1px solid rgba(255,60,172,.4);
    border-radius:20px; padding:4px 10px;
  }

  /* Stun cooldown badge */
  #stun-cd-badge {
    font-family:'Black Han Sans',sans-serif; font-size:11px;
    color:#a78bfa; background:rgba(139,92,246,.15);
    border:1px solid rgba(139,92,246,.4); border-radius:20px; padding:3px 10px;
    display:none;
  }

  /* Bars row */
  #bars-row {
    width:100%; max-width:420px; padding:0 14px 5px; flex-shrink:0; z-index:10;
    display:flex; flex-direction:column; gap:4px;
  }
  .bar-row { display:flex; align-items:center; gap:8px; }
  .bar-icon { font-size:12px; width:18px; text-align:center; flex-shrink:0; }
  .bar-label { font-size:9px; color:rgba(255,255,255,.3); letter-spacing:1.5px; width:38px; flex-shrink:0; }
  .bar-track {
    flex:1; height:7px; background:rgba(255,255,255,.07);
    border-radius:99px; overflow:hidden; border:1px solid rgba(255,255,255,.05);
  }
  .bar-fill { height:100%; border-radius:99px; transition:background .3s; }

  /* player stamina */
  #p-stam-fill { background:linear-gradient(90deg,#00f5d4,#00e5ff); box-shadow:0 0 7px rgba(0,245,212,.6); }
  #p-stam-fill.sprint { background:linear-gradient(90deg,#ffe81a,#ff9500); box-shadow:0 0 10px rgba(255,232,26,.8); }
  #p-stam-fill.low { background:linear-gradient(90deg,#ff6b35,#ff3cac); animation:flicker .4s ease-in-out infinite alternate; }

  /* stun bar */
  #stun-fill { background:linear-gradient(90deg,#a78bfa,#6d28d9); box-shadow:0 0 7px rgba(139,92,246,.6); }
  #stun-fill.ready { background:linear-gradient(90deg,#c4b5fd,#a855f7); box-shadow:0 0 14px rgba(168,85,247,.9); animation:stunpulse 1s ease-in-out infinite; }
  #stun-fill.charging { background:linear-gradient(90deg,#6366f1,#4f46e5); }

  @keyframes stunpulse { 0%,100%{opacity:1} 50%{opacity:.65} }
  @keyframes flicker   { from{opacity:1} to{opacity:.6} }

  /* Canvas */
  #gameCanvas {
    display:block; width:100%; max-width:420px;
    border-left:1px solid rgba(255,255,255,.07); border-right:1px solid rgba(255,255,255,.07);
    background:#07071a; flex:1; min-height:0;
  }

  /* Controls */
  #controls {
    width:100%; max-width:420px; height:164px; background:var(--panel);
    border-top:1px solid rgba(255,255,255,.07);
    display:flex; align-items:center; justify-content:center;
    position:relative; flex-shrink:0;
  }
  #joystick-zone {
    width:126px; height:126px; border-radius:50%;
    background:rgba(255,255,255,.03); border:2px solid rgba(255,255,255,.08);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 28px rgba(0,245,212,.05);
  }
  #joystick-base {
    width:106px; height:106px; border-radius:50%;
    background:rgba(0,245,212,.04); border:1.5px solid rgba(0,245,212,.15);
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  #joystick-base::before,#joystick-base::after { content:''; position:absolute; background:rgba(255,255,255,.06); }
  #joystick-base::before { width:1px; height:70%; }
  #joystick-base::after  { width:70%; height:1px; }
  #joystick-knob {
    width:44px; height:44px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#00ffe0,#00a896);
    box-shadow:0 0 18px rgba(0,245,212,.7),0 4px 12px rgba(0,0,0,.6);
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    cursor:grab; z-index:5; transition:box-shadow .1s;
  }
  #joystick-knob.active { box-shadow:0 0 28px rgba(0,245,212,1),0 4px 16px rgba(0,0,0,.8); }
  .dir-hint { position:absolute; font-size:10px; color:rgba(255,255,255,.13); pointer-events:none; user-select:none; }
  .dir-hint.up    { top:4px;    left:50%; transform:translateX(-50%); }
  .dir-hint.down  { bottom:4px; left:50%; transform:translateX(-50%); }
  .dir-hint.left  { left:4px;   top:50%;  transform:translateY(-50%); }
  .dir-hint.right { right:4px;  top:50%;  transform:translateY(-50%); }

  /* right button group */
  #btn-group { position:absolute; right:18px; display:flex; flex-direction:column; gap:10px; align-items:center; }

  .action-btn {
    border-radius:50%; display:flex; flex-direction:column; align-items:center;
    justify-content:center; cursor:pointer; user-select:none; -webkit-user-select:none;
    border:2px solid rgba(255,255,255,.13); transition:transform .1s, box-shadow .1s;
    z-index:5;
  }
  .action-btn:active, .action-btn.pressed { transform:scale(.91); }
  .btn-icon  { font-size:18px; line-height:1; }
  .btn-label { font-family:'Black Han Sans',sans-serif; font-size:9px; letter-spacing:1px; margin-top:2px; }

  /* sprint */
  #sprint-btn {
    width:64px; height:64px;
    background:radial-gradient(circle at 35% 35%,#ffe81a,#ff9500);
    box-shadow:0 0 18px rgba(255,232,26,.5),0 4px 12px rgba(0,0,0,.6);
  }
  #sprint-btn .btn-label { color:rgba(0,0,0,.7); }
  #sprint-btn.exhausted { background:radial-gradient(circle at 35% 35%,#555,#333); box-shadow:0 0 6px rgba(0,0,0,.4); opacity:.5; }

  /* stun */
  #stun-btn {
    width:58px; height:58px;
    background:radial-gradient(circle at 35% 35%,#c4b5fd,#7c3aed);
    box-shadow:0 0 16px rgba(139,92,246,.55),0 4px 12px rgba(0,0,0,.6);
  }
  #stun-btn .btn-label { color:rgba(255,255,255,.8); }
  #stun-btn.cooldown { background:radial-gradient(circle at 35% 35%,#444,#222); box-shadow:none; opacity:.45; }
  #stun-btn.ready    { box-shadow:0 0 26px rgba(168,85,247,.9),0 4px 12px rgba(0,0,0,.6); animation:stunpulse 1s ease-in-out infinite; }

  #controls-info { position:absolute; left:14px; bottom:10px; font-size:9px; color:rgba(255,255,255,.14); line-height:1.8; }

  /* Overlays */
  .overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:20;
    background:rgba(7,7,26,.93); backdrop-filter:blur(4px);
  }
  .overlay-title {
    font-family:'Black Han Sans',sans-serif; font-size:40px; color:var(--accent3);
    text-shadow:0 0 30px var(--accent3),0 0 60px rgba(255,232,26,.3);
    margin-bottom:8px; animation:pulse 2s ease-in-out infinite;
  }
  .btn-ui {
    font-family:'Black Han Sans',sans-serif; font-size:17px; padding:13px 42px;
    border:none; border-radius:50px; cursor:pointer; letter-spacing:2px; transition:all .2s; margin:6px;
  }
  .btn-primary { background:linear-gradient(135deg,var(--accent),#7928ca); color:#fff; box-shadow:0 0 22px rgba(255,60,172,.5); }
  .btn-primary:active { transform:scale(.96); }
  .gameover-score { font-family:'Black Han Sans',sans-serif; font-size:56px; color:var(--accent2); text-shadow:0 0 28px var(--accent2); line-height:1; }
  .gameover-label { font-size:11px; letter-spacing:3px; color:rgba(255,255,255,.33); text-transform:uppercase; margin-bottom:4px; }
  .best-row { display:flex; align-items:center; gap:8px; margin-top:10px; margin-bottom:26px; font-size:13px; color:rgba(255,255,255,.38); }
  .best-val { color:var(--accent3); font-family:'Black Han Sans',sans-serif; font-size:17px; }
  #startOverlay .icon { font-size:52px; margin-bottom:8px; }
  #startOverlay .tagline { font-size:12px; color:rgba(255,255,255,.33); margin-bottom:26px; letter-spacing:1px; }
  .rules { font-size:11px; color:rgba(255,255,255,.26); text-align:center; line-height:2.1; margin-top:12px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
  .shake { animation:shake .4s ease; }
</style>
</head>
<body>
<div id="wrapper">

  <!-- Credit -->
  <div id="credit-bar">제작자: <span>김태인</span></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-box"><div class="hud-label">점수</div><div class="hud-value" id="scoreDisplay">0</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div id="level-badge">⚡ LV <span id="levelDisplay">1</span></div>
      <div id="stun-cd-badge">⚡스턴 충전중…</div>
    </div>
    <div class="hud-box"><div class="hud-label">최고</div><div class="hud-value" id="bestDisplay">0</div></div>
  </div>

  <!-- Bars -->
  <div id="bars-row">
    <!-- player stamina -->
    <div class="bar-row">
      <div class="bar-icon">🏃</div>
      <div class="bar-label">스태미나</div>
      <div class="bar-track"><div class="bar-fill" id="p-stam-fill" style="width:100%"></div></div>
    </div>
    <!-- stun charge -->
    <div class="bar-row">
      <div class="bar-icon">⚡</div>
      <div class="bar-label">스턴게이지</div>
      <div class="bar-track"><div class="bar-fill" id="stun-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- Controls -->
  <div id="controls">
    <div id="joystick-zone">
      <div id="joystick-base">
        <span class="dir-hint up">▲</span><span class="dir-hint down">▼</span>
        <span class="dir-hint left">◀</span><span class="dir-hint right">▶</span>
        <div id="joystick-knob"></div>
      </div>
    </div>

    <div id="btn-group">
      <!-- Sprint -->
      <div class="action-btn" id="sprint-btn">
        <div class="btn-icon">💨</div><div class="btn-label">달리기</div>
      </div>
      <!-- Stun -->
      <div class="action-btn stun-btn" id="stun-btn">
        <div class="btn-icon">⚡</div><div class="btn-label">스턴</div>
      </div>
    </div>

    <div id="controls-info">조이스틱 이동<br>💨 달리기 꾹<br>⚡ 스턴 발사</div>
  </div>

  <!-- Start Overlay -->
  <div class="overlay" id="startOverlay">
    <div class="icon">🏃</div>
    <div class="overlay-title">술래 피하기</div>
    <div class="tagline">달리고, 스턴 쏘고, 살아남아라!</div>
    <button class="btn-ui btn-primary" id="startBtn">게임 시작</button>
    <div class="rules">
      🟢 초록 = 나 &nbsp;|&nbsp; 🔴 빨강 = 술래<br>
      💨 달리기 버튼 꾹 → 빠르게 도망<br>
      ⚡ 스턴 게이지 모으면 술래 기절!<br>
      🔴 술래도 스태미나 모아서 달린다!
    </div>
  </div>

  <!-- Game Over -->
  <div class="overlay" id="gameoverOverlay" style="display:none">
    <div class="overlay-title">💀 잡혔다!</div>
    <div class="gameover-label">생존 시간</div>
    <div class="gameover-score" id="finalScore">0</div>
    <div class="best-row">🏆 최고기록 <span class="best-val" id="finalBest">0</span></div>
    <button class="btn-ui btn-primary" id="restartBtn">다시 하기</button>
  </div>
</div>

<script>
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const pStamFill = document.getElementById('p-stam-fill');
const stunFill  = document.getElementById('stun-fill');
const sprintBtn = document.getElementById('sprint-btn');
const stunBtn   = document.getElementById('stun-btn');
const stunCdBadge = document.getElementById('stun-cd-badge');

// ── resize
function resize() {
  const W = Math.min(document.getElementById('wrapper').clientWidth, 420);
  const taken = ['credit-bar','hud','bars-row','controls'].reduce((s,id)=>s+document.getElementById(id).offsetHeight,0);
  canvas.width  = W;
  canvas.height = Math.max(document.getElementById('wrapper').clientHeight - taken, 240);
}
resize(); window.addEventListener('resize', resize);

// ── joystick
const jZone = document.getElementById('joystick-zone');
const jBase = document.getElementById('joystick-base');
const jKnob = document.getElementById('joystick-knob');
const joy = { dx:0, dy:0, active:false, id:null };
const MAX_R = 36;
function joyStart(x,y){ joy.active=true; jKnob.classList.add('active'); joyMove(x,y); }
function joyMove(cx,cy){
  if(!joy.active) return;
  const r=jBase.getBoundingClientRect();
  const ox=cx-(r.left+r.width/2), oy=cy-(r.top+r.height/2);
  const dist=Math.sqrt(ox*ox+oy*oy);
  const cl=Math.min(dist,MAX_R); const ang=Math.atan2(oy,ox);
  jKnob.style.left=(50+Math.cos(ang)*cl/(jBase.offsetWidth/2)*50)+'%';
  jKnob.style.top =(50+Math.sin(ang)*cl/(jBase.offsetHeight/2)*50)+'%';
  joy.dx=dist>6?ox/dist:0; joy.dy=dist>6?oy/dist:0;
}
function joyEnd(){ joy.active=false; joy.dx=0; joy.dy=0; jKnob.style.left='50%'; jKnob.style.top='50%'; jKnob.classList.remove('active'); }
jZone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];joy.id=t.identifier;joyStart(t.clientX,t.clientY);},{passive:false});
jZone.addEventListener('touchmove', e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===joy.id)joyMove(t.clientX,t.clientY);},{passive:false});
jZone.addEventListener('touchend',  ()=>joyEnd());
jZone.addEventListener('mousedown', e=>{joy.id=-1;joyStart(e.clientX,e.clientY);});
window.addEventListener('mousemove',e=>{if(joy.active)joyMove(e.clientX,e.clientY);});
window.addEventListener('mouseup',  ()=>{if(joy.active)joyEnd();});

// ── sprint button
let sprintHeld=false;
sprintBtn.addEventListener('touchstart',e=>{e.preventDefault();sprintHeld=true;sprintBtn.classList.add('pressed');},{passive:false});
sprintBtn.addEventListener('touchend',  e=>{e.preventDefault();sprintHeld=false;sprintBtn.classList.remove('pressed');},{passive:false});
sprintBtn.addEventListener('mousedown', ()=>{sprintHeld=true; sprintBtn.classList.add('pressed');});
window.addEventListener('mouseup',()=>{sprintHeld=false;sprintBtn.classList.remove('pressed');});

// ── stun button
let stunPressed=false;
stunBtn.addEventListener('touchstart',e=>{e.preventDefault();stunPressed=true;},{passive:false});
stunBtn.addEventListener('touchend',  e=>{e.preventDefault();stunPressed=false;},{passive:false});
stunBtn.addEventListener('mousedown', ()=>stunPressed=true);
window.addEventListener('mouseup', ()=>stunPressed=false);

// keyboard
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true; if(e.key==='Shift')sprintHeld=true; if(e.key===' ')stunPressed=true;});
window.addEventListener('keyup',  e=>{keys[e.key]=false;if(e.key==='Shift')sprintHeld=false;if(e.key===' ')stunPressed=false;});

// ── constants
const P_STAM_MAX=100, P_DRAIN=55, P_REGEN=28, P_MIN_START=15;
const STUN_MAX=100, STUN_REGEN=12, STUN_DURATION=2.8;
const STUN_RADIUS=90; // range for stun pulse
const E_STAM_MAX=100, E_SPRINT_DRAIN=50, E_SPRINT_REGEN=22;

// ── game
const game={
  running:false, score:0, best:parseInt(localStorage.getItem('dodgeBest3')||'0'),
  level:1, startTime:0, lastTime:0, particles:[], floatingTexts:[],
  // player stamina
  pStam:P_STAM_MAX, pSprinting:false, pExhausted:false,
  // stun
  stunCharge:0, stunCooldown:0,
  // player
  player:{x:0,y:0,r:13,baseSpeed:3.0,trail:[],angle:0,legPhase:0},
  enemies:[],

  init(){
    this.score=0; this.level=1; this.particles=[]; this.floatingTexts=[];
    this.pStam=P_STAM_MAX; this.pSprinting=false; this.pExhausted=false;
    this.stunCharge=0; this.stunCooldown=0;
    this.player.trail=[]; this.player.legPhase=0;
    resize();
    this.player.x=canvas.width/2; this.player.y=canvas.height/2;
    this.enemies=[]; this.spawnEnemies();
    document.getElementById('scoreDisplay').textContent='0';
    document.getElementById('levelDisplay').textContent='1';
    document.getElementById('bestDisplay').textContent=this.best;
    this.updateUI();
  },

  updateUI(){
    // player stamina bar
    const pp=this.pStam/P_STAM_MAX;
    pStamFill.style.width=(pp*100)+'%';
    pStamFill.classList.remove('sprint','low');
    if(this.pSprinting) pStamFill.classList.add('sprint');
    else if(pp<0.25)    pStamFill.classList.add('low');
    sprintBtn.classList.toggle('exhausted',this.pExhausted);

    // stun bar
    const sp=Math.min(this.stunCharge/STUN_MAX,1);
    stunFill.style.width=(sp*100)+'%';
    stunFill.classList.remove('ready','charging');
    if(this.stunCooldown>0){ stunFill.classList.add('charging'); stunFill.style.width=(((STUN_MAX-this.stunCooldown)/STUN_MAX)*100)+'%'; }
    else if(sp>=1)          stunFill.classList.add('ready');

    const cdReady=this.stunCharge>=STUN_MAX && this.stunCooldown<=0;
    stunBtn.classList.toggle('cooldown',this.stunCooldown>0);
    stunBtn.classList.toggle('ready',   cdReady);
    stunCdBadge.style.display=this.stunCooldown>0?'block':'none';
  },

  spawnEnemies(){
    this.enemies=[];
    this.addEnemy();
  },

  addEnemy(){
    const side=Math.floor(Math.random()*4); let x,y; const p=30;
    if(side===0){x=Math.random()*canvas.width;y=-p;}
    else if(side===1){x=canvas.width+p;y=Math.random()*canvas.height;}
    else if(side===2){x=Math.random()*canvas.width;y=canvas.height+p;}
    else{x=-p;y=Math.random()*canvas.height;}
    const base=1.15+this.level*0.18;
    this.enemies.push({
      x,y,r:13,
      baseSpeed:base+Math.random()*0.4,
      speed:base+Math.random()*0.4,
      wobble:Math.random()*Math.PI*2,
      wobbleSpeed:0.04+Math.random()*0.03,
      trail:[],
      hue:Math.floor(Math.random()*30),
      legPhase:Math.random()*Math.PI*2,
      // enemy stamina / sprint
      eStam:E_STAM_MAX,
      eSprinting:false,
      eExhausted:false,
      eSprintTimer:0,   // time until next sprint attempt
      // stun
      stunTimer:0,
    });
  },

  spawnParticles(x,y,color,n=12){
    for(let i=0;i<n;i++){
      const ang=(Math.PI*2/n)*i+Math.random()*0.3;
      const spd=2+Math.random()*4;
      this.particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r:3+Math.random()*4,alpha:1,color,decay:.03+Math.random()*.03});
    }
  },

  spawnText(x,y,text,color){
    this.floatingTexts.push({x,y,text,color,alpha:1,vy:-1.4,life:1.2,t:0});
  },

  fireStun(){
    if(this.stunCharge<STUN_MAX||this.stunCooldown>0) return;
    const pl=this.player;
    // shockwave particle burst
    this.spawnParticles(pl.x,pl.y,'#a78bfa',30);
    this.spawnParticles(pl.x,pl.y,'#c4b5fd',20);
    let hit=0;
    for(const e of this.enemies){
      const d=Math.sqrt((e.x-pl.x)**2+(e.y-pl.y)**2);
      if(d<STUN_RADIUS){
        e.stunTimer=STUN_DURATION;
        e.eSprinting=false;
        this.spawnParticles(e.x,e.y,'#fbbf24',14);
        this.spawnText(e.x,e.y-20,'STUN!','#fbbf24');
        hit++;
      }
    }
    if(hit===0) this.spawnText(pl.x,pl.y-24,'범위 밖!','#94a3b8');
    this.stunCharge=0;
    this.stunCooldown=STUN_MAX; // cooldown refills bar
  },

  update(dt){
    const pl=this.player;
    const W=canvas.width, H=canvas.height;

    // ── keyboard
    let kx=0,ky=0;
    if(keys['ArrowLeft']||keys['a'])kx-=1;
    if(keys['ArrowRight']||keys['d'])kx+=1;
    if(keys['ArrowUp']||keys['w'])ky-=1;
    if(keys['ArrowDown']||keys['s'])ky+=1;
    let dx=joy.dx+kx, dy=joy.dy+ky;
    const len=Math.sqrt(dx*dx+dy*dy); const moving=len>0.05;
    if(len>1){dx/=len;dy/=len;}

    // ── player stamina
    const wantSprint=sprintHeld&&moving;
    if(this.pExhausted){
      this.pSprinting=false;
      this.pStam=Math.min(P_STAM_MAX,this.pStam+P_REGEN*dt);
      if(this.pStam>=P_MIN_START) this.pExhausted=false;
    } else if(wantSprint&&this.pStam>0){
      this.pSprinting=true;
      this.pStam=Math.max(0,this.pStam-P_DRAIN*dt);
      if(this.pStam===0){this.pExhausted=true;this.pSprinting=false;}
    } else {
      this.pSprinting=false;
      this.pStam=Math.min(P_STAM_MAX,this.pStam+P_REGEN*dt);
    }

    // ── stun charge / cooldown
    if(this.stunCooldown>0){
      this.stunCooldown=Math.max(0,this.stunCooldown-STUN_REGEN*1.8*dt);
      if(this.stunCooldown===0) this.stunCharge=0;
    } else {
      this.stunCharge=Math.min(STUN_MAX,this.stunCharge+STUN_REGEN*dt);
    }
    // fire stun
    if(stunPressed) this.fireStun();
    stunPressed=false; // consume (don't hold-fire)

    this.updateUI();

    // ── move player
    const spMult=this.pSprinting?1.9:1.0;
    const spd=pl.baseSpeed*spMult;
    if(moving){ pl.angle=Math.atan2(dy,dx); pl.legPhase+=spd*dt*8; }
    pl.x=Math.max(pl.r,Math.min(W-pl.r, pl.x+dx*spd*dt*60));
    pl.y=Math.max(pl.r,Math.min(H-pl.r, pl.y+dy*spd*dt*60));
    const tLen=this.pSprinting?20:10;
    pl.trail.unshift({x:pl.x,y:pl.y,sprint:this.pSprinting});
    if(pl.trail.length>tLen) pl.trail.pop();

    // ── enemies
    for(const e of this.enemies){
      // stun
      if(e.stunTimer>0){
        e.stunTimer=Math.max(0,e.stunTimer-dt);
        e.legPhase+=0.3*dt;
        e.trail.unshift({x:e.x,y:e.y});
        if(e.trail.length>4) e.trail.pop();
        // wobble in place
        e.x+=Math.sin(e.legPhase*3)*0.5;
        e.y+=Math.cos(e.legPhase*2.3)*0.5;
        continue;
      }

      // enemy AI stamina / sprint
      e.eSprintTimer=Math.max(0,e.eSprintTimer-dt);
      const distToPlayer=Math.sqrt((pl.x-e.x)**2+(pl.y-e.y)**2);

      if(e.eExhausted){
        e.eSprinting=false;
        e.eStam=Math.min(E_STAM_MAX,e.eStam+E_SPRINT_REGEN*dt);
        if(e.eStam>=30) e.eExhausted=false;
      } else if(!e.eSprinting && e.eStam>40 && e.eSprintTimer<=0 && distToPlayer<140){
        // decide to sprint: close to player and has stamina
        e.eSprinting=true;
        e.eSprintTimer=1.5+Math.random()*2;
      } else if(e.eSprinting){
        e.eStam=Math.max(0,e.eStam-E_SPRINT_DRAIN*dt);
        if(e.eStam<=0){e.eExhausted=true;e.eSprinting=false;}
        if(distToPlayer>180){e.eSprinting=false;e.eSprintTimer=2;} // no point sprinting if far
      } else {
        e.eStam=Math.min(E_STAM_MAX,e.eStam+E_SPRINT_REGEN*dt);
      }

      e.wobble+=e.wobbleSpeed;
      e.legPhase+=e.speed*dt*7*(e.eSprinting?1.6:1);
      const tdx=pl.x-e.x, tdy=pl.y-e.y;
      const dist=Math.sqrt(tdx*tdx+tdy*tdy)||1;
      const perpX=-tdy/dist, perpY=tdx/dist;
      const wAmt=Math.sin(e.wobble)*(e.eSprinting?0.18:0.35);
      const sMult=e.eSprinting?1.85:1.0;
      e.x+=(tdx/dist+perpX*wAmt)*e.speed*sMult*dt*60;
      e.y+=(tdy/dist+perpY*wAmt)*e.speed*sMult*dt*60;
      e.trail.unshift({x:e.x,y:e.y,sprint:e.eSprinting});
      if(e.trail.length>10) e.trail.pop();

      if(dist<e.r+pl.r-2){
        this.spawnParticles(pl.x,pl.y,'#00f5d4',20);
        this.spawnParticles(e.x,e.y,'#ff4444',15);
        this.end(); return;
      }
    }

    // ── particles
    for(const pt of this.particles){pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=.92;pt.vy*=.92;pt.alpha-=pt.decay;}
    this.particles=this.particles.filter(p=>p.alpha>0);

    // ── floating texts
    for(const ft of this.floatingTexts){ft.t+=dt;ft.y+=ft.vy;ft.alpha=Math.max(0,1-ft.t/ft.life);}
    this.floatingTexts=this.floatingTexts.filter(ft=>ft.alpha>0);

    // ── score & level
    this.score=Math.floor((Date.now()-this.startTime)/100);
    const nl=1+Math.floor(this.score/30);
    if(nl>this.level){
      this.level=nl;
      document.getElementById('levelDisplay').textContent=this.level;
      for(const e of this.enemies){e.speed+=0.1;e.baseSpeed+=0.1;}
    }
    document.getElementById('scoreDisplay').textContent=this.score;
  },

  drawStickman(x,y,r,angle,legPhase,isSprinting,color,glowColor,isStunned){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle+Math.PI/2);
    ctx.shadowColor=isStunned?'#fbbf24':glowColor;
    ctx.shadowBlur=isSprinting?28:isStunned?22:16;
    ctx.strokeStyle=isStunned?'#fbbf24':color;
    ctx.lineCap='round'; ctx.lineJoin='round';
    const sc=r/13, lw=2.5*sc;
    ctx.lineWidth=lw;
    const hR=5*sc,bL=10*sc,lgL=9*sc,aL=7*sc;
    const hY=-bL/2-hR,bTop=-bL/2,bBot=bL/2;
    // head
    ctx.beginPath(); ctx.arc(0,hY,hR,0,Math.PI*2); ctx.stroke();
    // body
    ctx.beginPath(); ctx.moveTo(0,bTop); ctx.lineTo(0,bBot); ctx.stroke();
    // legs
    const sw=Math.sin(legPhase)*(isSprinting?0.9:isStunned?0.2:0.55);
    const bd=Math.abs(Math.sin(legPhase))*(isSprinting?0.5:0.3);
    ctx.beginPath(); ctx.moveTo(0,bBot);
    ctx.quadraticCurveTo(-lgL*.45*Math.sin(sw+bd),bBot+lgL*.45*Math.cos(Math.abs(sw)),-lgL*.7*Math.sin(sw),bBot+lgL*Math.cos(Math.max(0,sw)*.3+.2));
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,bBot);
    ctx.quadraticCurveTo(lgL*.45*Math.sin(sw-bd),bBot+lgL*.45*Math.cos(Math.abs(sw+Math.PI)),lgL*.7*Math.sin(sw),bBot+lgL*Math.cos(Math.max(0,-sw)*.3+.2));
    ctx.stroke();
    // arms
    const as=-Math.sin(legPhase)*(isSprinting?0.7:0.4);
    ctx.beginPath(); ctx.moveTo(0,bTop+2*sc); ctx.lineTo(-aL*.8*Math.sin(as+.3),bTop+aL*.9*Math.cos(as+.3)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,bTop+2*sc); ctx.lineTo(aL*.8*Math.sin(as-.3),bTop+aL*.9*Math.cos(as-.3)); ctx.stroke();
    // sprint lines
    if(isSprinting){
      ctx.globalAlpha=.32; ctx.lineWidth=sc;
      for(let i=0;i<3;i++){
        const ox=(Math.random()-.5)*10*sc, oy=(Math.random()+.5)*10*sc;
        ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox,oy+(8+Math.random()*8)*sc); ctx.stroke();
      }
    }
    // stun stars
    if(isStunned){
      ctx.globalAlpha=.9; ctx.restore();
      ctx.save();
      ctx.translate(x,y);
      const starR=r+6, t=Date.now()/300;
      for(let i=0;i<3;i++){
        const a=t+i*(Math.PI*2/3);
        ctx.fillStyle='#fbbf24'; ctx.shadowColor='#fbbf24'; ctx.shadowBlur=12;
        ctx.font=`${10*sc}px serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('★',Math.cos(a)*starR,Math.sin(a)*starR-r);
      }
    }
    ctx.restore();
  },

  draw(){
    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);
    // grid
    ctx.strokeStyle='rgba(255,255,255,.025)'; ctx.lineWidth=1;
    for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // stun shockwave ring (if recently fired)
    if(this._stunRingAlpha>0){
      ctx.save();
      ctx.globalAlpha=this._stunRingAlpha;
      ctx.strokeStyle='#a78bfa'; ctx.lineWidth=3;
      ctx.shadowColor='#a78bfa'; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.arc(this.player.x,this.player.y,this._stunRingR,0,Math.PI*2); ctx.stroke();
      ctx.restore();
      this._stunRingAlpha-=0.04; this._stunRingR+=4;
    }

    // particles
    for(const pt of this.particles){
      ctx.save(); ctx.globalAlpha=pt.alpha; ctx.fillStyle=pt.color;
      ctx.shadowColor=pt.color; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2); ctx.fill(); ctx.restore();
    }

    // player trail
    const pl=this.player;
    for(let i=0;i<pl.trail.length;i++){
      const t=pl.trail[i];
      ctx.save(); ctx.globalAlpha=(1-i/pl.trail.length)*(t.sprint?.42:.16);
      const col=t.sprint?'#ffe81a':'#00f5d4';
      ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.arc(t.x,t.y,pl.r*(1-i/pl.trail.length)*.7,0,Math.PI*2); ctx.fill(); ctx.restore();
    }

    // player
    const plColor=this.pSprinting?'#ffe81a':'#00f5d4';
    const plGlow =this.pSprinting?'#ffa500':'#00f5d4';
    this.drawStickman(pl.x,pl.y,pl.r,pl.angle,pl.legPhase,this.pSprinting,plColor,plGlow,false);

    // enemies
    for(const e of this.enemies){
      // trail
      for(let i=0;i<e.trail.length;i++){
        const t=e.trail[i];
        ctx.save(); ctx.globalAlpha=(1-i/e.trail.length)*(t.sprint?.38:.18);
        const col=e.stunTimer>0?'#fbbf24':t.sprint?'#ff8800':'#ff4444';
        ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(t.x,t.y,e.r*(1-i/e.trail.length)*.6,0,Math.PI*2); ctx.fill(); ctx.restore();
      }
      const ang=Math.atan2(pl.y-e.y,pl.x-e.x);
      const ec=e.stunTimer>0?'#fbbf24':e.eSprinting?'#ff8800':`hsl(${e.hue},100%,65%)`;
      const eg=e.stunTimer>0?'#fbbf24':'#ff2222';
      this.drawStickman(e.x,e.y,e.r,ang,e.legPhase,e.eSprinting,ec,eg,e.stunTimer>0);

      // enemy stamina bar (small, above head)
      if(!e.stunTimer){
        const bw=26, bh=4, bx=e.x-bw/2, by=e.y-e.r-18;
        ctx.save();
        ctx.fillStyle='rgba(0,0,0,.5)';
        ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,2); ctx.fill();
        const ef=e.eStam/E_STAM_MAX;
        ctx.fillStyle=e.eSprinting?'#ff8800':'#ff4444';
        ctx.shadowColor=e.eSprinting?'#ff8800':'#ff0000'; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.roundRect(bx,by,bw*ef,bh,2); ctx.fill();
        ctx.restore();
        // sprint icon above enemy
        if(e.eSprinting){
          ctx.save(); ctx.font='11px serif'; ctx.textAlign='center';
          ctx.fillStyle='#ff8800'; ctx.shadowColor='#ff8800'; ctx.shadowBlur=8;
          ctx.fillText('💨',e.x,e.y-e.r-22); ctx.restore();
        }
      }
    }

    // floating texts
    for(const ft of this.floatingTexts){
      ctx.save(); ctx.globalAlpha=ft.alpha;
      ctx.font='bold 13px Jua,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=ft.color; ctx.shadowColor=ft.color; ctx.shadowBlur=10;
      ctx.fillText(ft.text,ft.x,ft.y); ctx.restore();
    }
  },

  loop(ts){
    if(!this.running) return;
    const dt=Math.min((ts-this.lastTime)/1000,.05);
    this.lastTime=ts;
    this.update(dt); this.draw();
    requestAnimationFrame(t=>this.loop(t));
  },

  start(){
    this.running=true; this._stunRingAlpha=0; this._stunRingR=0;
    this.startTime=Date.now(); this.lastTime=performance.now();
    document.getElementById('startOverlay').style.display='none';
    document.getElementById('gameoverOverlay').style.display='none';
    requestAnimationFrame(t=>this.loop(t));
  },

  end(){
    this.running=false;
    if(this.score>this.best){
      this.best=this.score; localStorage.setItem('dodgeBest3',this.best);
      document.getElementById('bestDisplay').textContent=this.best;
    }
    document.getElementById('finalScore').textContent=this.score;
    document.getElementById('finalBest').textContent=this.best;
    const go=document.getElementById('gameoverOverlay');
    go.style.display='flex'; go.classList.remove('shake'); void go.offsetWidth; go.classList.add('shake');
    this.draw();
    for(let i=0;i<25;i++) this.spawnParticles(Math.random()*canvas.width,Math.random()*canvas.height,Math.random()>.5?'#ff3cac':'#ffe81a',6);
    let fr=0; const burst=()=>{ if(fr++>45)return; for(const pt of this.particles){pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=.9;pt.vy*=.9;pt.alpha-=pt.decay;} this.particles=this.particles.filter(p=>p.alpha>0); this.draw(); requestAnimationFrame(burst); }; requestAnimationFrame(burst);
  }
};

// patch fireStun to show ring
const origFire=game.fireStun.bind(game);
game.fireStun=function(){
  const hadCharge=this.stunCharge>=STUN_MAX&&this.stunCooldown<=0;
  origFire();
  if(hadCharge){ this._stunRingAlpha=1; this._stunRingR=20; }
};

// ── 배경음악
const bgm = new Audio('aa.mp3');
bgm.loop = true;
bgm.volume = 0.5;
function playBGM(){ bgm.currentTime=0; bgm.play().catch(()=>{}); }

document.getElementById('startBtn').addEventListener('click',()=>{ game.init(); game.start(); playBGM(); });
document.getElementById('restartBtn').addEventListener('click',()=>{ game.init(); game.start(); playBGM(); });
document.getElementById('bestDisplay').textContent=game.best;
</script>
</body>
